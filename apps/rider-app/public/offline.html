<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
    <meta name="theme-color" content="#0B0E11" />
    <title>Offline — AJKMart Rider</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        background: #0b0e11;
        color: #e8e9ef;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
      }
      .icon {
        width: 72px;
        height: 72px;
        background: rgba(240, 185, 11, 0.1);
        border: 1px solid rgba(240, 185, 11, 0.3);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .icon svg {
        width: 36px;
        height: 36px;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #e8e9ef;
      }
      p {
        font-size: 14px;
        color: #6b7280;
        line-height: 1.6;
        margin-bottom: 8px;
        max-width: 280px;
      }
      .tips {
        background: #131720;
        border: 1px solid rgba(240, 185, 11, 0.12);
        border-radius: 16px;
        padding: 16px;
        margin: 20px 0;
        text-align: left;
        max-width: 320px;
        width: 100%;
      }
      .tips h2 {
        font-size: 11px;
        font-weight: 700;
        color: #f0b90b;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .tip {
        font-size: 13px;
        color: #9ca3af;
        padding: 6px 0;
        border-bottom: 1px solid #1f2533;
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }
      .tip:last-child {
        border-bottom: none;
      }
      .tip span {
        flex-shrink: 0;
      }
      button {
        margin-top: 4px;
        height: 48px;
        width: 100%;
        max-width: 320px;
        background: linear-gradient(135deg, #f0b90b, #d97706);
        color: #0b0e11;
        font-weight: 700;
        font-size: 15px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(240, 185, 11, 0.25);
      }
      button:active {
        opacity: 0.85;
      }
      .urdu {
        font-family: serif;
        direction: rtl;
        font-size: 13px;
        color: #6b7280;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="icon">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="#F0B90B"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>

    <h1>No Internet Connection</h1>
    <p>You are offline. Connect to the internet to use AJKMart Rider.</p>
    <p class="urdu">انٹرنیٹ نہیں ہے۔ براہ کرم اپنا نیٹ ورک چیک کریں۔</p>

    <div class="tips">
      <h2>Try these steps</h2>
      <div class="tip"><span>📶</span> Switch between mobile data and Wi-Fi</div>
      <div class="tip"><span>✈️</span> Toggle airplane mode off and on</div>
      <div class="tip"><span>📍</span> Move to an area with better signal</div>
      <div class="tip"><span>🔄</span> Restart your mobile data</div>
    </div>

    <button onclick="tryReload()">Try Again</button>

    <script>
      function tryReload() {
        if (navigator.onLine) {
          window.location.replace("/rider/");
        } else {
          var btn = document.querySelector("button");
          var orig = btn.textContent;
          btn.textContent = "Still offline…";
          btn.style.background = "#1F2533";
          btn.style.color = "#6B7280";
          btn.style.boxShadow = "none";
          setTimeout(function () {
            btn.textContent = orig;
            btn.style.background = "";
            btn.style.color = "";
            btn.style.boxShadow = "";
          }, 2000);
        }
      }
      window.addEventListener("online", function () {
        setTimeout(function () {
          window.location.replace("/rider/");
        }, 500);
      });
    </script>
  </body>
</html>
