openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AJKMart Super App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: products
    description: Product catalog
  - name: orders
    description: Orders management
  - name: cart
    description: Shopping cart
  - name: wallet
    description: Digital wallet
  - name: rides
    description: Ride/taxi booking
  - name: locations
    description: Location tracking
  - name: notifications
    description: Push notifications & inbox
  - name: addresses
    description: Saved delivery addresses
  - name: reviews
    description: Product & vendor reviews
  - name: referrals
    description: Referral programme
  - name: loyalty
    description: Loyalty points
  - name: kyc
    description: Identity verification
  - name: push
    description: Web push subscriptions
  - name: sos
    description: Emergency SOS alerts
  - name: support
    description: Customer support chat
  - name: promotions
    description: Promo codes & campaigns
  - name: banners
    description: Home-screen banners
  - name: recommendations
    description: Product recommendations
  - name: pharmacy
    description: Pharmacy order service
  - name: parcel
    description: Parcel delivery service
  - name: payments
    description: Payment methods
  - name: maps
    description: Geocoding & mapping
  - name: school
    description: School transport routes
  - name: delivery
    description: Delivery eligibility
  - name: platform
    description: Platform configuration
  - name: vendor
    description: Vendor portal
  - name: rider
    description: Rider app
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────

  /auth/config:
    get:
      operationId: getAuthConfig
      tags: [auth]
      summary: Get enabled auth methods and OTP bypass status
      responses:
        "200":
          description: Auth configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthConfig"

  /auth/otp-status:
    get:
      operationId: getOtpStatus
      tags: [auth]
      summary: Check per-phone OTP bypass status
      parameters:
        - name: phone
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OTP bypass status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpStatusResponse"

  /auth/check-identifier:
    post:
      operationId: checkIdentifier
      tags: [auth]
      summary: Account discovery — determine next login action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckIdentifierRequest"
      responses:
        "200":
          description: Available auth methods
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIdentifierResponse"

  /auth/send-otp:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpRequest"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOtpResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and login/register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/send-email-otp:
    post:
      operationId: sendEmailOtp
      tags: [auth]
      summary: Send OTP to email address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              required: [email]
      responses:
        "200":
          description: Email OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOtpResponse"

  /auth/verify-email-otp:
    post:
      operationId: verifyEmailOtp
      tags: [auth]
      summary: Verify email OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
              required: [email, otp]
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register with phone and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username/phone/email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login/username:
    post:
      operationId: loginUsername
      tags: [auth]
      summary: Login with username and password (alias)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and invalidate tokens
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /auth/validate-token:
    post:
      operationId: validateToken
      tags: [auth]
      summary: Validate JWT access token
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  user:
                    $ref: "#/components/schemas/User"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOtpResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /auth/set-password:
    post:
      operationId: setPassword
      tags: [auth]
      summary: Set password for OTP-only account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
              required: [password]
      responses:
        "200":
          description: Password set
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /auth/social/google:
    post:
      operationId: googleSignIn
      tags: [auth]
      summary: Sign in with Google ID token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialAuthRequest"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/social/facebook:
    post:
      operationId: facebookSignIn
      tags: [auth]
      summary: Sign in with Facebook access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialAuthRequest"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/magic-link/send:
    post:
      operationId: sendMagicLink
      tags: [auth]
      summary: Send magic link to email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              required: [email]
      responses:
        "200":
          description: Magic link sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOtpResponse"

  /auth/magic-link/verify:
    post:
      operationId: verifyMagicLink
      tags: [auth]
      summary: Verify magic link token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required: [token]
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/2fa/verify:
    post:
      operationId: verifyTwoFa
      tags: [auth]
      summary: Verify TOTP 2FA code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFaVerifyRequest"
      responses:
        "200":
          description: 2FA verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/2fa/setup:
    get:
      operationId: getTwoFaSetup
      tags: [auth]
      summary: Get TOTP setup details (QR code + secret)
      responses:
        "200":
          description: TOTP setup info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFaSetupResponse"

  /auth/2fa/verify-setup:
    post:
      operationId: verifyTwoFaSetup
      tags: [auth]
      summary: Confirm TOTP setup with first code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required: [token]
      responses:
        "200":
          description: TOTP enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  recoveryCodes:
                    type: array
                    items:
                      type: string

  /auth/login-history:
    get:
      operationId: getLoginHistory
      tags: [auth]
      summary: Get recent login history
      responses:
        "200":
          description: Login history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginHistoryResponse"

  /auth/sessions:
    get:
      operationId: getSessions
      tags: [auth]
      summary: List active sessions
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionsResponse"
    delete:
      operationId: revokeAllSessions
      tags: [auth]
      summary: Revoke all sessions except current
      responses:
        "200":
          description: Sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /auth/sessions/{id}:
    delete:
      operationId: revokeSession
      tags: [auth]
      summary: Revoke a specific session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ── Users ──────────────────────────────────────────────────────────────────

  /users/profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get user profile
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Cart ───────────────────────────────────────────────────────────────────

  /cart/snapshot:
    get:
      operationId: getCartSnapshot
      tags: [cart]
      summary: Get current cart snapshot
      responses:
        "200":
          description: Cart contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartSnapshot"
    put:
      operationId: saveCartSnapshot
      tags: [cart]
      summary: Save (upsert) cart snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartSnapshot"
      responses:
        "200":
          description: Cart saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartSnapshot"
    delete:
      operationId: clearCartSnapshot
      tags: [cart]
      summary: Clear cart
      responses:
        "200":
          description: Cart cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ── Products ───────────────────────────────────────────────────────────────

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [mart, food]
        - name: sort
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product (vendor only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /categories:
    get:
      operationId: getCategories
      tags: [products]
      summary: Get product categories
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [mart, food]
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"

  # ── Orders ─────────────────────────────────────────────────────────────────

  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: Get user orders
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── Wallet ─────────────────────────────────────────────────────────────────

  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet balance and transactions
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletResponse"

  /wallet/topup:
    post:
      operationId: topUpWallet
      tags: [wallet]
      summary: Top up wallet balance (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopUpRequest"
      responses:
        "200":
          description: Updated wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletResponse"

  /wallet/deposit:
    post:
      operationId: walletDeposit
      tags: [wallet]
      summary: Request a wallet deposit (bank transfer/JazzCash/EasyPaisa)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletDepositRequest"
      responses:
        "200":
          description: Deposit request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletDepositResult"

  /wallet/deposits:
    get:
      operationId: getWalletDeposits
      tags: [wallet]
      summary: List wallet deposit history
      responses:
        "200":
          description: Deposit list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletDepositsResponse"

  /wallet/deposit-methods:
    get:
      operationId: getWalletDepositMethods
      tags: [wallet]
      summary: Get available wallet deposit methods
      responses:
        "200":
          description: Deposit methods
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletMethodsResponse"

  /wallet/withdrawal-methods:
    get:
      operationId: getWalletWithdrawalMethods
      tags: [wallet]
      summary: Get available wallet withdrawal methods
      responses:
        "200":
          description: Withdrawal methods
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletMethodsResponse"

  /wallet/withdraw:
    post:
      operationId: walletWithdraw
      tags: [wallet]
      summary: Withdraw from wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletWithdrawRequest"
      responses:
        "200":
          description: Withdrawal requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  withdrawalId:
                    type: string

  /wallet/resolve-phone:
    post:
      operationId: resolveWalletPhone
      tags: [wallet]
      summary: Look up wallet holder by phone for P2P transfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
              required: [phone]
      responses:
        "200":
          description: Wallet holder info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletHolderResponse"

  /wallet/send:
    post:
      operationId: walletSend
      tags: [wallet]
      summary: Send money to another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletSendRequest"
      responses:
        "200":
          description: Transfer successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  newBalance:
                    type: string

  /wallet/pin/setup:
    post:
      operationId: setupWalletPin
      tags: [wallet]
      summary: Set up wallet PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletPinRequest"
      responses:
        "200":
          description: PIN set
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /wallet/pin/verify:
    post:
      operationId: verifyWalletPin
      tags: [wallet]
      summary: Verify wallet PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletPinRequest"
      responses:
        "200":
          description: PIN verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean

  /wallet/pin/change:
    post:
      operationId: changeWalletPin
      tags: [wallet]
      summary: Change wallet PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPin:
                  type: string
                newPin:
                  type: string
              required: [currentPin, newPin]
      responses:
        "200":
          description: PIN changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /wallet/visibility:
    patch:
      operationId: updateWalletVisibility
      tags: [wallet]
      summary: Toggle wallet balance visibility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hidden:
                  type: boolean
              required: [hidden]
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  hidden:
                    type: boolean

  # ── Rides ──────────────────────────────────────────────────────────────────

  /rides:
    post:
      operationId: bookRide
      tags: [rides]
      summary: Book a ride
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookRideRequest"
      responses:
        "201":
          description: Booked ride
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"

  /rides/{id}:
    get:
      operationId: getRide
      tags: [rides]
      summary: Get ride status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
