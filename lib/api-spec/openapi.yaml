components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Auth schemas ──────────────────────────────────────────────────────────

    AuthConfig:
      type: object
      properties:
        auth_mode:
          type: string
        firebase_enabled:
          type: string
        auth_otp_enabled:
          type: string
        auth_email_enabled:
          type: string
        auth_google_enabled:
          type: string
        auth_facebook_enabled:
          type: string
        otpBypassActive:
          type: boolean
        otpBypassExpiresAt:
          type: string
          nullable: true
        bypassMessage:
          type: string
          nullable: true
      required: [auth_mode, otpBypassActive]

    OtpStatusResponse:
      type: object
      properties:
        bypassActive:
          type: boolean
        bypassExpiresAt:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
      required: [bypassActive]

    CheckIdentifierRequest:
      type: object
      properties:
        identifier:
          type: string
        role:
          type: string
          enum: [customer, rider, vendor]
        deviceId:
          type: string
      required: [identifier]

    CheckIdentifierResponse:
      type: object
      properties:
        action:
          type: string
        availableMethods:
          type: array
          items:
            type: string
        isBanned:
          type: boolean
        isLocked:
          type: boolean
        lockedMinutes:
          type: integer
      required: [action, availableMethods]

    SendOtpRequest:
      type: object
      properties:
        phone:
          type: string
        role:
          type: string
          enum: [customer, rider, vendor]
        preferredChannel:
          type: string
          enum: [whatsapp, sms, email]
      required: [phone]

    SendOtpResponse:
      type: object
      properties:
        message:
          type: string
        otp:
          type: string
          description: Dev only - OTP for testing
      required: [message]

    VerifyOtpRequest:
      type: object
      properties:
        phone:
          type: string
        otp:
          type: string
        role:
          type: string
          enum: [customer, rider, vendor]
      required: [phone, otp]

    RegisterRequest:
      type: object
      properties:
        phone:
          type: string
        password:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [customer, rider, vendor]
        email:
          type: string
          format: email
        username:
          type: string
        businessName:
          type: string
        storeName:
          type: string
        vehicleType:
          type: string
        vehiclePlate:
          type: string
      required: [phone, password]

    LoginRequest:
      type: object
      properties:
        identifier:
          type: string
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [customer, rider, vendor]
      required: [password]

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string

    RefreshTokenResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
      required: [token]

    ForgotPasswordRequest:
      type: object
      properties:
        phone:
          type: string
        email:
          type: string
          format: email
        identifier:
          type: string

    ResetPasswordRequest:
      type: object
      properties:
        phone:
          type: string
        otp:
          type: string
        newPassword:
          type: string
      required: [otp, newPassword]

    SocialAuthRequest:
      type: object
      properties:
        token:
          type: string
        role:
          type: string
          enum: [customer, rider, vendor]
      required: [token]

    TwoFaVerifyRequest:
      type: object
      properties:
        challengeToken:
          type: string
        code:
          type: string
      required: [challengeToken, code]

    TwoFaSetupResponse:
      type: object
      properties:
        secret:
          type: string
        qrCodeUrl:
          type: string
        uri:
          type: string
      required: [secret, qrCodeUrl]

    LoginHistoryEntry:
      type: object
      properties:
        id:
          type: string
        ip:
          type: string
        userAgent:
          type: string
        createdAt:
          type: string
        success:
          type: boolean
      required: [id, createdAt, success]

    LoginHistoryResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LoginHistoryEntry"
      required: [entries]

    Session:
      type: object
      properties:
        id:
          type: string
        userAgent:
          type: string
        ip:
          type: string
        createdAt:
          type: string
        lastUsedAt:
          type: string
        isCurrent:
          type: boolean
      required: [id, createdAt]

    SessionsResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/Session"
      required: [sessions]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    # ── User schemas ──────────────────────────────────────────────────────────

    User:
      type: object
      properties:
        id:
          type: string
        phone:
          type: string
        name:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
        avatar:
          type: string
        walletBalance:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, phone, roles, walletBalance, isActive, createdAt]

    UpdateProfileRequest:
      type: object
      properties:
        userId:
          type: string
        name:
          type: string
        email:
          type: string
        avatar:
          type: string
      required: [userId]

    # ── Cart schemas ──────────────────────────────────────────────────────────

    CartSnapshot:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        vendorId:
          type: string
        serviceType:
          type: string
        updatedAt:
          type: string
      required: [items]

    # ── Product schemas ───────────────────────────────────────────────────────

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: string
        originalPrice:
          type: string
        category:
          type: string
        type:
          type: string
          enum: [mart, food, rides, pharmacy, parcel, van, school]
        image:
          type: string
        images:
          type: array
          items:
            type: string
        stock:
          type: integer
        approvalStatus:
          type: string
          enum: [pending, approved, rejected]
        videoUrl:
          type: string
          nullable: true
        vendorId:
          type: string
        vendorName:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        inStock:
          type: boolean
        unit:
          type: string
        deliveryTime:
          type: string
      required: [id, name, price, category, type, inStock]

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
      required: [products, total]

    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: string
        category:
          type: string
        type:
          type: string
          enum: [mart, food]
        image:
          type: string
        vendorId:
          type: string
        unit:
          type: string
      required: [name, price, category, type, vendorId]

    CartItem:
      type: object
      properties:
        productId:
          type: string
        name:
          type: string
        price:
          type: string
        quantity:
          type: integer
        image:
          type: string
      required: [productId, name, price, quantity]

    CategoryListResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
      required: [categories]

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [mart, food]
        image:
          type: string
        parentId:
          type: string
          nullable: true
      required: [id, name, type]

    # ── Order schemas ─────────────────────────────────────────────────────────

    Order:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        vendorId:
          type: string
        assignedRiderId:
          type: string
        type:
          type: string
          enum: [mart, food, rides, pharmacy, parcel, van, school]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        status:
          type: string
          enum:
            [
              pending,
              confirmed,
              preparing,
              ready,
              picked_up,
              out_for_delivery,
              delivered,
              cancelled,
            ]
        total:
          type: string
        deliveryAddress:
          type: string
        customerLat:
          type: number
        customerLng:
          type: number
        paymentMethod:
          type: string
          enum: [cash, wallet]
